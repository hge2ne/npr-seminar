<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body style="margin: 0; padding: 18px 20px;">
<div id="root"></div>
<script type="text/babel">
const { Dialog, Toast, Tooltip, Button, IconButton } = window.DesignSystem_179b2a;

const calIcon = <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="3"></rect><path d="M16 2v4M8 2v4M3 10h18"></path></svg>;

function Demo() {
  const [open, setOpen] = React.useState(false);
  const [toastKey, setToastKey] = React.useState(0);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
      <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
        <Button variant="secondary" onClick={() => setOpen(true)}>다이얼로그 열기</Button>
        <Button variant="ghost" onClick={() => setToastKey(toastKey + 1)}>토스트 재생</Button>
        <Tooltip content="캘린더에 추가"><IconButton variant="outline" label="캘린더">{calIcon}</IconButton></Tooltip>
        <span style={{ fontSize: 12, color: 'var(--text-faint)' }}>← hover 툴팁</span>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10, alignItems: 'flex-start' }}>
        <Toast key={'a' + toastKey} tone="success" action="티켓 보기">예약이 확정되었어요</Toast>
        <Toast key={'b' + toastKey} tone="danger" style={{ animationDelay: '120ms' }}>예약이 취소되었어요</Toast>
        <Toast key={'c' + toastKey} tone="info" style={{ animationDelay: '240ms' }}>대기 3번째 — 자리가 나면 알려드릴게요</Toast>
      </div>
      <Dialog
        open={open}
        onClose={() => setOpen(false)}
        title="예약을 취소할까요?"
        footer={<React.Fragment><Button variant="ghost" onClick={() => setOpen(false)}>돌아가기</Button><Button variant="danger" onClick={() => setOpen(false)}>예약 취소</Button></React.Fragment>}
      >
        취소 후에는 잔여석 상황에 따라 재예약이 어려울 수 있어요.
      </Dialog>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>

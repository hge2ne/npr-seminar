<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>npr 입시설명회 — 예약</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
<style>
  body { max-width: 480px; margin: 0 auto; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="MobileFlow.jsx"></script>
<script type="text/babel">
/* 학부모 모바일 엔트리 — 콘솔 store의 모바일 서브셋 (액션 시맨틱은 index.html App과 동일) */
function MobileApp() {
  const D = window.NPR_DATA;
  const [reservations, setReservations] = React.useState(D.reservations);
  const [sessions] = React.useState(D.sessions);
  const [surveyResponses, setSurveyResponses] = React.useState(D.surveyResponses);
  const counter = React.useRef(5000);

  /* "07/16(수) 14:03:22" */
  const fmtNow = () => { const d = new Date(); const p = (n) => String(n).padStart(2, '0'); const w = ['일', '월', '화', '수', '목', '금', '토'][d.getDay()]; return `${p(d.getMonth() + 1)}/${p(d.getDate())}(${w}) ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; };

  const store = {
    CAMPUSES: D.CAMPUSES, sessions, students: D.students, reservations, surveyResponses,
    addReservation: (r) => {
      const now = fmtNow();
      const id = 'r' + (counter.current++);
      const rec = { logs: [{ label: r.channel === 'mobile' ? '웹앱 예약' : '수동 예약', at: now }], scannerNo: null, enteredAt: null, source: r.channel === 'mobile' ? '웹앱' : '수동', reservedBy: r.reservedBy || '', ...r, id, code: `NPR-${r.sessionId.toUpperCase()}-${String(counter.current).padStart(4, '0')}`, status: 'reserved', time: now };
      setReservations((p) => [rec, ...p]);
      return rec;
    },
    /* 가족(형제) 예약 — matchedBy: '모'|'부'|'모,부' */
    addReservationGroup: (base, picks, attendCount, matchedBy) => {
      const now = fmtNow();
      const gid = picks.length > 1 ? 'grp' + (counter.current++) : null;
      const recs = picks.map((st) => {
        const id = 'r' + (counter.current++);
        return { id, code: `NPR-${base.sessionId.toUpperCase()}-${String(counter.current).padStart(4, '0')}`, sessionId: base.sessionId, studentId: st.id, name: st.name, school: st.school, grade: st.grade, className: st.className, teacherName: st.teacherName, campus: st.campus, unit: st.unit, phone: matchedBy === '부' ? st.fatherPhone : st.motherPhone, channel: 'mobile', member: true, attendCount, status: 'reserved', reservedBy: matchedBy || '모', source: '웹앱', time: now, groupId: gid, scannerNo: null, enteredAt: null, logs: [{ label: '웹앱 예약', at: now }] };
      });
      setReservations((p) => [...recs, ...p]);
      return recs;
    },
    cancelReservation: (id, by) => { const now = fmtNow(); setReservations((p) => p.map((r) => r.id === id ? { ...r, status: 'cancelled', cancelledBy: by || 'parent', logs: (r.logs || []).concat({ label: by === 'parent' ? '웹앱 예약 취소' : '수동 예약 취소', at: now }) } : r)); },
    moveReservation: (id, toSessionId) => setReservations((p) => p.map((r) => r.id === id ? { ...r, sessionId: toSessionId, history: (r.history || []).concat({ from: r.sessionId, to: toSessionId, when: '방금' }) } : r)),
    addSurveyResponse: (resp) => { const rec = { ...resp, id: 'sv' + (counter.current++) }; setSurveyResponses((p) => [rec, ...p]); return rec; },
  };
  return <MobileFlow store={store} />;
}
ReactDOM.createRoot(document.getElementById('root')).render(<MobileApp />);
</script>
</body>
</html>

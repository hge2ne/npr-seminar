<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin: 0; padding: 20px; background: var(--gray-2);">
<div style="max-width: 560px; margin: 0 auto; background: var(--surface-card); border-radius: var(--radius-lg); box-shadow: var(--shadow-raised); display: flex; overflow: hidden;">
  <div style="flex: 1; padding: 22px 26px;">
    <div style="font-size: 11px; letter-spacing: var(--tracking-caps); color: var(--text-accent); font-weight: 700; margin-bottom: 6px;">SIGNATURE MOTIF</div>
    <div style="font-family: var(--font-display); font-weight: 800; font-size: 21px; color: var(--text-strong);">티켓처럼, 소중하게</div>
    <div style="font-size: 13px; color: var(--text-muted); margin-top: 6px; line-height: 1.55;">확정된 예약은 절취선과 펀치홀이 있는 티켓으로 표현합니다. 블루 스탬프는 확정 순간에만 사용해요.</div>
  </div>
  <div style="position: relative; width: 0; border-left: 2px dashed var(--gray-3);">
    <span style="position: absolute; top: -12px; left: -13px; width: 24px; height: 24px; border-radius: 50%; background: var(--gray-2);"></span>
    <span style="position: absolute; bottom: -12px; left: -13px; width: 24px; height: 24px; border-radius: 50%; background: var(--gray-2);"></span>
  </div>
  <div style="width: 150px; background: var(--surface-accent-soft); display: flex; align-items: center; justify-content: center;">
    <span style="width: 74px; height: 74px; border-radius: 50%; border: 2.5px solid var(--mint-500); background: rgba(56,189,248,0.08); color: var(--mint-600); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 800; font-size: 14px; text-align: center; line-height: 1.25; transform: rotate(-8deg);">예약<br>확정</span>
  </div>
</div>
</body>
</html>

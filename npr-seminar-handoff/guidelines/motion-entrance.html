<!-- @dsCard group="Motion" viewport="700x240" name="Entrance Patterns" subtitle="fade-up · pop · stamp · stagger — 클릭해서 재생" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  .demo { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; cursor: pointer; }
  .chip { height: 120px; border-radius: var(--radius-lg); background: var(--surface-card); box-shadow: var(--shadow-card); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
  .play .a1 { animation: ds-fade-up var(--dur-slow) var(--ease-out) both; }
  .play .a2 { animation: ds-pop var(--dur-slow) var(--ease-spring) both 120ms; }
  .play .a3 .stamp { animation: ds-stamp var(--dur-hero) var(--ease-spring) both 240ms; }
  .play .a4 span.dot { animation: ds-fade-up var(--dur-base) var(--ease-out) both; }
  .play .a4 .d2 { animation-delay: 70ms; } .play .a4 .d3 { animation-delay: 140ms; } .play .a4 .d4 { animation-delay: 210ms; }
  .stamp { width: 52px; height: 52px; border-radius: 50%; border: 2px solid var(--mint-500); color: var(--mint-600); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 800; font-size: 11px; transform: rotate(-8deg); }
  .dot { width: 14px; height: 14px; border-radius: 4px; background: var(--violet-800); display: inline-block; }
</style>
</head>
<body style="margin: 0; padding: 18px 22px;">
<div class="demo" id="demo">
  <div class="chip a1"><b style="color: var(--text-strong); font-family: var(--font-display);">fade-up</b>등장 기본</div>
  <div class="chip a2"><b style="color: var(--text-strong); font-family: var(--font-display);">pop</b>모달·배지</div>
  <div class="chip a3"><span class="stamp">확정</span>stamp — 티켓</div>
  <div class="chip a4"><span style="display: flex; gap: 6px;"><span class="dot"></span><span class="dot d2"></span><span class="dot d3"></span><span class="dot d4"></span></span>stagger 70ms</div>
</div>
<div style="font-size: 11.5px; color: var(--text-faint); margin-top: 12px;">카드를 클릭하면 다시 재생됩니다</div>
<script>
  const demo = document.getElementById('demo');
  const replay = () => { demo.classList.remove('play'); void demo.offsetWidth; demo.classList.add('play'); };
  demo.addEventListener('click', replay);
  requestAnimationFrame(() => demo.classList.add('play'));
</script>
</body>
</html>

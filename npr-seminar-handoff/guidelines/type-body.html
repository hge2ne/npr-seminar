<!-- @dsCard group="Type" viewport="700x210" name="Body — Pretendard" subtitle="본문·UI 텍스트, 가변 웨이트" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin: 0; padding: 20px 22px;">
<p style="margin: 0; max-width: 560px; font-size: var(--text-body-lg); line-height: var(--leading-body); color: var(--text-body);">
  예약이 확정되면 문자와 이메일로 티켓을 보내드려요. 설명회 시작 10분 전까지 입장해 주세요.
  <span style="color: var(--text-muted);">잔여석은 실시간으로 갱신됩니다.</span>
</p>
<div style="display: flex; gap: 24px; margin-top: 20px; align-items: baseline; color: var(--text-strong);">
  <span style="font-weight: 400; font-size: 16px;">Regular</span>
  <span style="font-weight: 500; font-size: 16px;">Medium</span>
  <span style="font-weight: 600; font-size: 16px;">SemiBold</span>
  <span style="font-weight: 700; font-size: 16px;">Bold</span>
  <span style="font-feature-settings: 'tnum'; font-weight: 600; font-size: 16px; color: var(--violet-800);">0123456789 <span style="font-size: 12px; color: var(--text-faint);">tnum</span></span>
</div>
<div style="margin-top: 14px; font-size: 12.5px; color: var(--text-faint);">캡션 13px — 안내·메타 정보 <span style="letter-spacing: var(--tracking-caps); font-weight: 700; font-size: 11px; color: var(--text-accent); margin-left: 10px;">OVERLINE 라벨 0.14EM</span></div>
</body>
</html>

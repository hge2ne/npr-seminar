<!-- @dsCard group="Colors" viewport="700x150" name="Status" subtitle="예약 상태 시맨틱 — solid + soft 짝" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin: 0; padding: 16px;">
<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
  <div style="border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-hairline);">
    <div style="height: 54px; background: var(--status-success); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12.5px; font-weight: 700;">예약 확정</div>
    <div style="height: 42px; background: var(--status-success-soft); display: flex; align-items: center; justify-content: center; color: var(--status-success); font-size: 12px; font-weight: 600;">success-soft</div>
  </div>
  <div style="border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-hairline);">
    <div style="height: 54px; background: var(--status-warning); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12.5px; font-weight: 700;">마감 임박</div>
    <div style="height: 42px; background: var(--status-warning-soft); display: flex; align-items: center; justify-content: center; color: var(--status-warning); font-size: 12px; font-weight: 600;">warning-soft</div>
  </div>
  <div style="border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-hairline);">
    <div style="height: 54px; background: var(--status-danger); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12.5px; font-weight: 700;">마감 · 취소</div>
    <div style="height: 42px; background: var(--status-danger-soft); display: flex; align-items: center; justify-content: center; color: var(--status-danger); font-size: 12px; font-weight: 600;">danger-soft</div>
  </div>
  <div style="border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-hairline);">
    <div style="height: 54px; background: var(--status-info); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12.5px; font-weight: 700;">안내 · 온라인</div>
    <div style="height: 42px; background: var(--status-info-soft); display: flex; align-items: center; justify-content: center; color: var(--status-info); font-size: 12px; font-weight: 600;">info-soft</div>
  </div>
</div>
</body>
</html>

<!-- @dsCard group="Surface" viewport="700x200" name="Shadows" subtitle="슬레이트가 섞인 3단 그림자 + 블루 글로우" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin: 0; padding: 24px;">
<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px;">
  <div style="height: 110px; border-radius: var(--radius-lg); background: var(--surface-card); box-shadow: var(--shadow-card); display: flex; align-items: flex-end; padding: 12px; font-size: 11.5px; color: var(--text-muted);">card — 목록</div>
  <div style="height: 110px; border-radius: var(--radius-lg); background: var(--surface-card); box-shadow: var(--shadow-raised); display: flex; align-items: flex-end; padding: 12px; font-size: 11.5px; color: var(--text-muted);">raised — hover</div>
  <div style="height: 110px; border-radius: var(--radius-lg); background: var(--surface-card); box-shadow: var(--shadow-float); display: flex; align-items: flex-end; padding: 12px; font-size: 11.5px; color: var(--text-muted);">float — 모달·팝오버</div>
  <div style="height: 110px; border-radius: var(--radius-lg); background: var(--surface-card); box-shadow: var(--shadow-accent-glow); display: flex; align-items: flex-end; padding: 12px; font-size: 11.5px; color: var(--mint-700);">accent-glow — 포커스·선택</div>
</div>
</body>
</html>

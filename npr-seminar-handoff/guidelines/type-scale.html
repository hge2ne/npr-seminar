<!-- @dsCard group="Type" viewport="700x330" name="Type Scale" subtitle="display-xl 60 → micro 11.5" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin: 0; padding: 18px 22px;">
<div style="display: grid; grid-template-columns: 96px 1fr; gap: 12px 16px; align-items: baseline;">
  <span style="font-size: 11px; color: var(--text-faint); font-feature-settings: 'tnum';">60 display-xl</span>
  <span style="font-family: var(--font-display); font-weight: 800; font-size: var(--text-display-xl); letter-spacing: var(--tracking-display); line-height: 1.1; color: var(--text-strong);">예약하기</span>
  <span style="font-size: 11px; color: var(--text-faint);">44 display</span>
  <span style="font-family: var(--font-display); font-weight: 800; font-size: var(--text-display); letter-spacing: var(--tracking-display); line-height: 1.12; color: var(--text-strong);">설명회 탐색</span>
  <span style="font-size: 11px; color: var(--text-faint);">32 h1</span>
  <span style="font-family: var(--font-display); font-weight: 700; font-size: var(--text-h1); line-height: 1.2; color: var(--text-strong);">수시 입학설명회</span>
  <span style="font-size: 11px; color: var(--text-faint);">24 h2</span>
  <span style="font-family: var(--font-display); font-weight: 700; font-size: var(--text-h2); color: var(--text-strong);">회차를 선택하세요</span>
  <span style="font-size: 11px; color: var(--text-faint);">19 h3</span>
  <span style="font-family: var(--font-display); font-weight: 700; font-size: var(--text-h3); color: var(--text-strong);">예약자 정보</span>
  <span style="font-size: 11px; color: var(--text-faint);">17 / 15 body</span>
  <span style="font-size: var(--text-body-lg); color: var(--text-body);">본문 크게 17 · <span style="font-size: var(--text-body-md);">기본 15 — 목록, 설명, 폼</span></span>
  <span style="font-size: 11px; color: var(--text-faint);">13 / 11.5</span>
  <span style="font-size: var(--text-caption); color: var(--text-muted);">캡션 13 · <span style="font-size: var(--text-micro); letter-spacing: var(--tracking-caps); font-weight: 700; color: var(--text-accent);">MICRO 오버라인</span></span>
</div>
</body>
</html>

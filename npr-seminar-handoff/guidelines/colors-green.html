<!-- @dsCard group="Colors" viewport="700x170" name="Primary Blue" subtitle="브랜드 코어 램프 — 프라이머리 블루 램프" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin: 0; padding: 16px;">
<div style="display: grid; grid-template-columns: repeat(9, 1fr); gap: 8px;">
  <div style="height: 96px; border-radius: var(--radius-sm); background: var(--violet-50); border: 1px solid var(--border-hairline);"></div>
  <div style="height: 96px; border-radius: var(--radius-sm); background: var(--violet-100);"></div>
  <div style="height: 96px; border-radius: var(--radius-sm); background: var(--violet-200);"></div>
  <div style="height: 96px; border-radius: var(--radius-sm); background: var(--violet-500);"></div>
  <div style="height: 96px; border-radius: var(--radius-sm); background: var(--violet-600);"></div>
  <div style="height: 96px; border-radius: var(--radius-sm); background: var(--violet-700);"></div>
  <div style="height: 96px; border-radius: var(--radius-sm); background: var(--violet-800);"></div>
  <div style="height: 96px; border-radius: var(--radius-sm); background: var(--violet-900); box-shadow: var(--shadow-accent-glow);"></div>
  <div style="height: 96px; border-radius: var(--radius-sm); background: var(--violet-950);"></div>
  <span style="font-size: 10.5px; color: var(--text-muted); text-align: center;">50</span>
  <span style="font-size: 10.5px; color: var(--text-muted); text-align: center;">100</span>
  <span style="font-size: 10.5px; color: var(--text-muted); text-align: center;">200</span>
  <span style="font-size: 10.5px; color: var(--text-muted); text-align: center;">500</span>
  <span style="font-size: 10.5px; color: var(--text-muted); text-align: center;">600</span>
  <span style="font-size: 10.5px; color: var(--text-muted); text-align: center;">700</span>
  <span style="font-size: 10.5px; color: var(--text-muted); text-align: center;">800</span>
  <span style="font-size: 10.5px; color: var(--text-strong); text-align: center; font-weight: 700;">900 코어</span>
  <span style="font-size: 10.5px; color: var(--text-muted); text-align: center;">950</span>
</div>
</body>
</html>

<!-- @dsCard group="Colors" viewport="700x170" name="Sky" subtitle="포인트 램프 — 확정·강조·스탬프에만 아껴 쓰는 블루" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin: 0; padding: 16px;">
<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;">
  <div style="height: 96px; border-radius: var(--radius-sm); background: var(--mint-50); border: 1px solid var(--border-hairline);"></div>
  <div style="height: 96px; border-radius: var(--radius-sm); background: var(--mint-100);"></div>
  <div style="height: 96px; border-radius: var(--radius-sm); background: var(--mint-200);"></div>
  <div style="height: 96px; border-radius: var(--radius-sm); background: var(--mint-400);"></div>
  <div style="height: 96px; border-radius: var(--radius-sm); background: var(--mint-500); box-shadow: var(--shadow-accent-glow);"></div>
  <div style="height: 96px; border-radius: var(--radius-sm); background: var(--mint-600);"></div>
  <div style="height: 96px; border-radius: var(--radius-sm); background: var(--mint-700);"></div>
  <span style="font-size: 10.5px; color: var(--text-muted); text-align: center;">50</span>
  <span style="font-size: 10.5px; color: var(--text-muted); text-align: center;">100</span>
  <span style="font-size: 10.5px; color: var(--text-muted); text-align: center;">200</span>
  <span style="font-size: 10.5px; color: var(--text-muted); text-align: center;">400</span>
  <span style="font-size: 10.5px; color: var(--text-strong); text-align: center; font-weight: 700;">500 포인트</span>
  <span style="font-size: 10.5px; color: var(--text-muted); text-align: center;">600</span>
  <span style="font-size: 10.5px; color: var(--text-muted); text-align: center;">700</span>
</div>
</body>
</html>

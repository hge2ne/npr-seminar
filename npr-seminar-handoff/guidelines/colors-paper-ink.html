<!-- @dsCard group="Colors" viewport="700x190" name="Paper & Ink" subtitle="쿨 그레이 표면 4단 + 다크 잉크 뉴트럴" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin: 0; padding: 16px; display: flex; flex-direction: column; gap: 10px;">
<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;">
  <div style="height: 64px; border-radius: var(--radius-sm); background: var(--gray-0); border: 1px solid var(--border-hairline); display: flex; align-items: flex-end; padding: 8px; font-size: 11px; color: var(--text-muted);">gray-0 카드</div>
  <div style="height: 64px; border-radius: var(--radius-sm); background: var(--gray-1); border: 1px solid var(--border-hairline); display: flex; align-items: flex-end; padding: 8px; font-size: 11px; color: var(--text-muted);">gray-1 페이지</div>
  <div style="height: 64px; border-radius: var(--radius-sm); background: var(--gray-2); display: flex; align-items: flex-end; padding: 8px; font-size: 11px; color: var(--text-muted);">gray-2 sunken</div>
  <div style="height: 64px; border-radius: var(--radius-sm); background: var(--gray-3); display: flex; align-items: flex-end; padding: 8px; font-size: 11px; color: var(--text-body);">gray-3 틴트</div>
</div>
<div style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;">
  <div style="height: 52px; border-radius: var(--radius-sm); background: var(--ink-200); display: flex; align-items: flex-end; padding: 7px; font-size: 10.5px; color: var(--ink-700);">ink-200</div>
  <div style="height: 52px; border-radius: var(--radius-sm); background: var(--ink-300); display: flex; align-items: flex-end; padding: 7px; font-size: 10.5px; color: var(--ink-900);">300</div>
  <div style="height: 52px; border-radius: var(--radius-sm); background: var(--ink-400); display: flex; align-items: flex-end; padding: 7px; font-size: 10.5px; color: #fff;">400</div>
  <div style="height: 52px; border-radius: var(--radius-sm); background: var(--ink-500); display: flex; align-items: flex-end; padding: 7px; font-size: 10.5px; color: #fff;">500 muted</div>
  <div style="height: 52px; border-radius: var(--radius-sm); background: var(--ink-700); display: flex; align-items: flex-end; padding: 7px; font-size: 10.5px; color: #fff;">700 body</div>
  <div style="height: 52px; border-radius: var(--radius-sm); background: var(--ink-900); display: flex; align-items: flex-end; padding: 7px; font-size: 10.5px; color: #fff;">900 strong</div>
</div>
</body>
</html>

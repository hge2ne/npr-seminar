<!-- @dsCard group="Brand" viewport="700x210" name="Wordmark" subtitle="전용 로고 없음 — 워드마크는 NanumSquareRound EB 플레인 타입" -->
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin: 0; padding: 16px;">
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
  <div style="height: 150px; border-radius: var(--radius-lg); background: var(--surface-brand); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;">
    <span style="font-family: var(--font-display); font-weight: 800; font-size: 32px; letter-spacing: var(--tracking-display); color: var(--gray-1);">입시설명회</span>
    <span style="font-size: 11px; letter-spacing: var(--tracking-caps); color: var(--mint-400); font-weight: 700;">ADMISSION SESSIONS</span>
  </div>
  <div style="height: 150px; border-radius: var(--radius-lg); background: var(--surface-card); border: 1px solid var(--border-hairline); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;">
    <span style="font-family: var(--font-display); font-weight: 800; font-size: 32px; letter-spacing: var(--tracking-display); color: var(--violet-900);">입시설명회</span>
    <span style="font-size: 11px; letter-spacing: var(--tracking-caps); color: var(--mint-600); font-weight: 700;">ADMISSION SESSIONS</span>
  </div>
</div>
</body>
</html>
